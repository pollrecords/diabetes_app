<ion-header [translucent]="true">

</ion-header>

<ion-content>
  <div class="boton-semaforo">
    <ion-grid>
      <ion-row>
        <ion-col><ion-button expand="block" color="transparent">FRUTA</ion-button></ion-col>
        <ion-col><ion-button expand="block" color="transparent">VERDURA</ion-button></ion-col>
        <ion-col><ion-button expand="block" color="transparent">LEGUMINOSAS</ion-button></ion-col>
      </ion-row>
    </ion-grid>
  </div>

  <div class="container">
    <ion-grid>


      <ion-row>
        <ion-col size="4">
          <ion-card class="card">
            <ion-card-content>
              <div class="manzana">
                <img src="/assets/manzana.png" alt="Fruta" />
              </div>
              <ion-button expand="block" fill="clear">Manzana</ion-button>
            </ion-card-content>
          </ion-card>
        </ion-col>
        <ion-col size="4">
          <ion-card class="card">
            <ion-card-content>
              <ion-button expand="block" fill="clear">Naranja</ion-button>
            </ion-card-content>
          </ion-card>
        </ion-col>
        <ion-col size="4">
          <ion-card class="card">
            <ion-card-content>
              <ion-button expand="block" fill="clear">Fresa</ion-button>
            </ion-card-content>
          </ion-card>
        </ion-col>
      </ion-row>

      <ion-row>
        <ion-col>
          <ion-card class="card">
            <ion-card-content>
              <ion-button expand="block" fill="clear">Sandía</ion-button>
            </ion-card-content>
          </ion-card>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>
</ion-content>
